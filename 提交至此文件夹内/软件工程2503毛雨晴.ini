// --- 函数声明 ---
void init_game(int level);
void render();
void handle_input();
void update_logic(int next_x, int next_y);
void reset_player_pos();

// --- 主函数 ---
int main() {
    printf("==========================================\n");
    printf("   欢迎进入 C 语言像素大冒险 (Pro 版)\n");
    printf("   作者：[mz] | 班级：[2503]\n");
    printf("==========================================\n");
    printf("操作指南:\n");
    printf("  W/A/S/D : 移动角色 (@)\n");
    printf("  目标    : 收集金币 ($), 躲避敌人 (E), 到达终点 (W)\n");
    printf("  规则    : 碰到敌人扣 1 血，血量归零游戏结束\n");
    printf("按任意键开始...\n");
    _getch();

    player.level = 1;
    player.is_over = 0;
    player.is_win = 0;

    while (!player.is_over) {
        init_game(player.level);
        
        // 单关卡循环
        while (!player.is_over && !player.is_win) {
            render();
            handle_input();
        }

        if (player.is_win && player.level < MAX_LEVELS) {
            printf("\n🎉 关卡 %d 完成！准备进入下一关...\n", player.level);
            Sleep(1500); // 暂停 1.5 秒
            player.level++;
            player.is_win = 0; // 重置胜利状态，继续游戏
        } else if (player.is_win) {
            printf("\n🏆 恭喜！你通过了所有关卡，成为 C 语言大师！\n");
            printf("最终得分：%d | 总步数：%d\n", player.score, player.steps);
            player.is_over = 1;
        } else {
            printf("\n💀 游戏结束！最终得分：%d\n", player.score);
            printf("按 'R' 重试本关，或任意键退出...\n");
            char choice = _getch();
            if (choice == 'r' || choice == 'R') {
                continue; // 重试当前关
            } else {
                break;
            }
        }
    }
    
    printf("\n感谢游玩！按任意键退出...\n");
    _getch();
    return 0;
}

// 初始化游戏状态
void init_game(int level) {
    int idx = level - 1;
    if (idx >= MAX_LEVELS) idx = MAX_LEVELS - 1;

    // 复制地图数据
    for (int i = 0; i < MAX_ROWS; i++) {
        for (int j = 0; j < MAX_COLS; j++) {
            int val = levels_data[idx][i][j];
            logic_map[i][j] = val;
            
            // 转换为显示字符
            switch (val) {
                case TILE_WALL:  display_map[i][j] = '#'; break;
                case TILE_COIN:  display_map[i][j] = '$'; break;
                case TILE_ENEMY: display_map[i][j] = 'E'; break;
                case TILE_WIN:   display_map[i][j] = 'W'; break;
                case TILE_START: 
                    display_map[i][j] = ' '; 
                    player.x = i; 
                    player.y = j; 
                    break;
                default:         display_map[i][j] = ' '; break;
            }
        }
    }

    // 如果不是第一关，保留分数，但重置生命和步数（或者根据需求调整）
    if (level == 1) {
        player.lives = INITIAL_LIVES;
        player.score = 0;
        player.steps = 0;
    } else {
        player.lives = INITIAL_LIVES; // 每关重置生命
        player.steps = 0;
    }
    player.is_win = 0;
}

// 渲染画面
void render() {
    system("cls");
    printf("=== 关卡：%d | 生命：%d | 得分：%d | 步数：%d ===\n", 
           player.level, player.lives, player.score, player.steps);
    printf("--------------------------------------------------\n");
    
    for (int i = 0; i < MAX_ROWS; i++) {
        // 打印每一行前，检查是否是该行有玩家
        for (int j = 0; j < MAX_COLS; j++) {
            if (i == player.x && j == player.y) {
                printf("\033[32m%c\033[0m ", '@'); // 绿色玩家 (ANSI 颜色，若不支持则显示@)
            } else {
                char c = display_map[i][j];
                if (c == '#') printf("\033[37m%c\033[0m ", c); // 白色墙
                else if (c == '$') printf("\033[33m%c\033[0m ", c); // 黄色金币
                else if (c == 'E') printf("\033[31m%c\033[0m ", c); // 红色敌人
                else if (c == 'W') printf("\033[36m%c\033[0m ", c); // 青色终点
                else printf("%c ", c);
            }
        }
        printf("\n");
    }
    printf("--------------------------------------------------\n");
    printf("提示：W(上) A(左) S(下) D(右) 移动\n");
}

// 处理输入
void handle_input() {
    char key = _getch();
    int dx = 0, dy = 0;

    if (key == 'w' || key == 'W') dx = -1;
    else if (key == 's' || key == 'S') dx = 1;
    else if (key == 'a' || key == 'A') dy = -1;
    else if (key == 'd' || key == 'D') dy = 1;
    else return; // 无效按键

    int nx = player.x + dx;
    int ny = player.y + dy;

    // 边界检查
    if (nx < 0 || nx >= MAX_ROWS || ny < 0 || ny >= MAX_COLS) return;

    update_logic(nx, ny);
}

// 更新逻辑
void update_logic(int nx, int ny) {
    int target = logic_map[nx][ny];

    if (target == TILE_WALL) {
        return; // 撞墙
    }

    player.steps++;

    if (target == TILE_ENEMY) {
        player.lives--;
        printf("\n⚠️ 碰到敌人！生命 -1\n");
        Sleep(500); // 短暂停顿让玩家感知
        if (player.lives <= 0) {
            player.is_over = 1;
        } else {
            // 碰到敌人后，该敌人消失（或者可以设计为反弹，这里简化为消失）
            logic_map[nx][ny] = TILE_EMPTY;
            display_map[nx][ny] = ' ';
            player.x = nx;
            player.y = ny;
        }
        return;
    }

    if (target == TILE_COIN) {
        player.score += 10;
        logic_map[nx][ny] = TILE_EMPTY;
        display_map[nx][ny] = ' ';
    }

    if (target == TILE_WIN) {
        player.is_win = 1;
        player.x = nx;
        player.y = ny;
        return;
    }

    // 普通移动
    player.x = nx;
    player.y = ny;
}
#include <stdio.h>
#include <conio.h>
#include <stdlib.h>
#include <string.h>
#include <time.h>

// --- 配置常量 ---
#define MAX_ROWS 15
#define MAX_COLS 30
#define MAX_LEVELS 2
#define INITIAL_LIVES 3

// --- 地图元素定义 ---
typedef enum {
    TILE_EMPTY = 0,
    TILE_WALL  = 1,
    TILE_COIN  = 2,
    TILE_ENEMY = 3,
    TILE_WIN   = 4,
    TILE_START = 9
} TileType;

// --- 游戏状态结构体 ---
typedef struct {
    int x, y;       // 坐标
    int lives;      // 生命值
    int score;      // 得分
    int steps;      // 步数
    int level;      // 当前关卡
    int is_over;    // 游戏结束标志
    int is_win;     // 通关标志
} GameState;

// --- 全局变量 ---
char display_map[MAX_ROWS][MAX_COLS]; // 显示用的字符地图
int logic_map[MAX_ROWS][MAX_COLS];    // 逻辑用的数字地图
GameState player;

// --- 关卡数据 (Level 1 & Level 2) ---
// 0:空，1:墙，2:金币，3:敌人，4:终点，9:起点
